# BPF Pipeline Default Configuration
# PulseLogic Biosciences Inc.
# Version: 1.0.0

pipeline:
  version: "1.0.0"
  seed: 42
  deterministic: true

# Gene filtering
preprocessing:
  variance_threshold: 0.01      # Minimum variance for gene retention
  missing_threshold: 0.50       # Maximum missing rate per gene
  normalization: "standard"     # StandardScaler

# Biomarker selection
selection:
  min_auc: 0.55                 # Minimum univariate AUC
  pvalue_threshold: 0.05        # Maximum Mann-Whitney U p-value
  max_genes: 100                # Maximum genes in panel
  direction_tracking: true      # Track up/down regulation

# Fusion
fusion:
  method: "auc_weighted_zscore" # Fusion method
  direction_correction: true    # Apply direction correction
  sigmoid_normalization: true   # Normalize to [0,1] via sigmoid

# Evaluation
evaluation:
  bootstrap_n: 1000             # Bootstrap resamples for CI
  bootstrap_seed: 42            # Bootstrap random seed
  ci_level: 0.95                # Confidence interval level

# Cross-validation
cross_validation:
  n_splits: 5                   # Number of folds
  n_repeats: 5                  # Number of repeats
  small_n_threshold: 50         # Switch to 3×3 CV below this
  small_n_splits: 3
  small_n_repeats: 3

# Output
output:
  files:
    - "DATA.json"
    - "DETAILED_STATS.txt"
    - "EXECUTIVE_SUMMARY.txt"
    - "FULL_AUC_RANKING.txt"
    - "GENE_PANEL.txt"
    - "SAMPLES.txt"
  precision: 4                  # Decimal places for AUC reporting
